name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-matrix:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - name: Build binary
        run: go build -o dist/zaibflow_${{ matrix.goos }}_${{ matrix.goarch }} ./cmd/zaibflow
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Package release
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}.zip zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}.exe || true
            rm -f zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}.exe
          else
            tar -czf zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}
            rm -f zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}
          fi
        shell: bash
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zaibflow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/zaibflow_*

  release:
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: |
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zaibflow_*.tar.gz
            dist/zaibflow_*.zip
            dist/checksums.txt
            dist/checksums.txt
            dist/latest.json
