name: Release

on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build-matrix:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create dist directory
        run: mkdir -p dist
        shell: bash

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-X github.com/Shahzaibzah00r/zaibflow/internal/version.Value=${VERSION}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags "${LDFLAGS}" -o dist/zaibflow.exe ./cmd/zaibflow
          else
            go build -ldflags "${LDFLAGS}" -o dist/zaibflow ./cmd/zaibflow
          fi
        shell: bash

      - name: Package release
        run: |
          cd dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}.zip zaibflow.exe
            rm -f zaibflow.exe
          else
            tar -czf zaibflow_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz zaibflow
            rm -f zaibflow
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zaibflow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/zaibflow_*.tar.gz
            dist/zaibflow_*.zip

  release:
    name: Create GitHub Release
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create checksums
        run: |
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zaibflow_*.tar.gz
            dist/zaibflow_*.zip
            dist/checksums.txt
